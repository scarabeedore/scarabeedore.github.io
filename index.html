<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scarabée Doré | Haute Performance</title>
    <style>
        :root {
            --gold: #D4AF37;
            --rose: #FF69B4;
            --black: #0a0a0a;
            --white: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--black);
            color: var(--white);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- 1. TITRES --- */
        h1 {
            font-size: clamp(1.8rem, 6vw, 3rem);
            margin: 60px 20px 10px 20px;
            color: var(--gold);
            font-weight: bold;
        }

        .subtitle {
            font-size: 1.2rem;
            font-style: italic;
            margin-bottom: 30px;
            max-width: 800px;
            padding: 0 20px;
            opacity: 0.8;
        }

        /* --- 2. NAVIGATION --- */
        nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            position: relative;
            padding: 8px 12px;
            transition: color 0.3s ease;
        }

        nav a:nth-child(1):hover { color: var(--rose); }
        nav a:nth-child(2):hover { color: var(--gold); }

        /* --- 3. VIDÉO RÉDUITE (MOITIÉ) --- */
        .video-container {
            width: 180px; /* Taille réduite de moitié */
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
            border-radius: 15px;
        }

        /* --- 4. BOUTON --- */
        .cta-button {
            display: inline-block;
            padding: 15px 35px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 0.9rem;
            transition: all 0.4s ease;
            margin-bottom: 60px;
        }

        .cta-button:hover {
            background: var(--gold);
            color: var(--black);
        }
    </style>
</head>
<body>

    <h1>Tu n’es pas bloquée par hasard.</h1>
    <p class="subtitle">Tu es bloquée parce que tu ne vois pas encore ce qui te retient.</p>

    <nav>
        <a href="#accueil">Accueil</a>
        <a href="#accompagnements">Accompagnements</a>
        <a href="#propos">À propos</a>
        <a href="#insights">Insights</a>
        <a href="#contact">Contact</a>
    </nav>

    <div class="video-container">
        <video autoplay loop muted playsinline preload="auto">
            <source src="video.mp4" type="video/mp4">
            Votre navigateur ne supporte pas la vidéo.
        </video>
    </div>

    <a href="#" class="cta-button">Travailler avec moi</a>

</body>
</html>
