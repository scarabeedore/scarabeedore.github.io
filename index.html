<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scarabée Doré | Haute Performance</title>
    <style>
        :root {
            --gold: #D4AF37;
            --rose: #FF69B4;
            --black: #0a0a0a;
            --white: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--black);
            color: var(--white);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- 1. TITRES --- */
        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin: 80px 20px 10px 20px;
            color: var(--gold);
            font-weight: bold;
            text-transform: none;
        }

        .subtitle {
            font-size: 1.4rem;
            font-style: italic;
            margin-bottom: 40px;
            max-width: 850px;
            padding: 0 20px;
            opacity: 0.9;
        }

        /* --- 2. NAVIGATION (SOUS LE TEXTE) --- */
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            position: relative;
            padding: 10px 15px;
            transition: color 0.3s ease;
        }

        /* Effet de cercle dynamique au survol */
        nav a::before {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border: 1px solid transparent;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.4s ease-in-out;
        }

        nav a:hover::before {
            width: 100%;
            height: 40px;
            border-color: rgba(212, 175, 55, 0.4);
            border-radius: 25px;
        }

        /* Couleurs au survol demandées */
        nav a:nth-child(1):hover { color: var(--rose); } /* ACCUEIL */
        nav a:nth-child(2):hover { color: var(--gold); } /* ACCOMPAGNEMENTS */
        nav a:nth-child(3):hover { color: #00BFFF; }    /* À PROPOS */
        nav a:nth-child(4):hover { color: #ADFF2F; }    /* INSIGHTS */
        nav a:nth-child(5):hover { color: #FFD700; }    /* CONTACT */

        /* --- 3. VIDÉO DU SCARABÉE --- */
        .video-container {
            width: 100%;
            max-width: 380px;
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
            border-radius: 20px;
        }

        /* --- 4. BOUTON --- */
        .cta-button {
            display: inline-block;
            padding: 18px 45px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            margin-bottom: 80px;
        }

        .cta-button:hover {
            background: var(--gold);
            color: var(--black);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>
<body>

    <!-- SECTION TITRE -->
    <h1>Tu n’es pas bloquée par hasard.</h1>
    <p class="subtitle">Tu es bloquée parce que tu ne vois pas encore ce qui te retient.</p>

    <!-- NAVIGATION SOUS LE TEXTE -->
    <nav>
        <a href="#accueil">Accueil</a>
        <a href="#accompagnements">Accompagnements</a>
        <a href="#propos">À propos</a>
        <a href="#insights">Insights</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- VIDÉO SCARABÉE -->
    <div class="video-container">
        <!-- Tentative de lecture avec le nom video.mp4 -->
        <video autoplay loop muted playsinline preload="auto">
            <source src="video.mp4" type="video/mp4">
            <!-- Secours si le fichier a gardé son ancien nom -->
            <source src="scarabee.mp4.mp4" type="video/mp4">
            Votre navigateur ne supporte pas la vidéo.
        </video>
    </div>

    <!-- BOUTON FINAL -->
    <a href="#" class="cta-button">Travailler avec moi</a>

</body>
</html>
